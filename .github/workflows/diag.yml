name: Diag read-only
on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: project-95c75d11-bb31-4e18-8a9
  GCP_REGION: asia-southeast1

jobs:
  diag:
    name: Read worker outcomes (read-only)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Worker run outcomes (reasons included)
        run: |
          gcloud logging read 'resource.type=cloud_run_job AND resource.labels.job_name=creditops-worker AND jsonPayload.event=worker_run_outcome' \
            --project="$GCP_PROJECT_ID" --limit=15 --freshness=2h \
            --format='value(timestamp,jsonPayload.outcome,jsonPayload.taskId,jsonPayload.reason)'
