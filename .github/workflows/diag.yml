name: Diag read-only
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    name: Read task failure reasons (read-only)
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Query task state via session pooler (read-only)
        run: |
          set -uo pipefail
          Q1="select id, task_type, status, attempt_count, available_at, left(coalesce(failure_reason,''),300) as failure_reason from public.processing_tasks order by created_at desc limit 8;"
          Q2="select msg_id, read_ct, vt, vt<=now() as visible_now from pgmq.q_creditops_document_tasks order by msg_id;"
          Q3="select stage, count(*) from public.document_versions group by stage;"
          Q4="select count(*) as candidates from public.candidate_facts;"
          for HOST in "aws-1-ap-southeast-1.pooler.supabase.com" "aws-0-ap-southeast-1.pooler.supabase.com" "aws-0-ap-southeast-2.pooler.supabase.com"; do
            URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@${HOST}:5432/postgres?sslmode=require"
            if psql "$URL" -P pager=off -c "select 1" >/dev/null 2>&1; then
              echo "== connected via $HOST =="
              psql "$URL" -P pager=off -c "$Q1" -c "$Q2" -c "$Q3" -c "$Q4"
              exit 0
            fi
          done
          echo "no pooler host reachable" >&2
          exit 1
