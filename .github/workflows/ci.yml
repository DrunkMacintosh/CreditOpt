name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and static checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.8"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run backend tests
        run: uv run pytest services/api/tests -q

      - name: Run Ruff
        run: uv run ruff check services/api/src services/api/tests

      - name: Run mypy
        run: uv run mypy services/api/src/creditops

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --dir apps/web test -- --run

      - name: Run TypeScript checks
        run: pnpm --dir apps/web typecheck

      - name: Run ESLint
        run: pnpm --dir apps/web lint

      - name: Build frontend
        run: pnpm --dir apps/web build
